appId: com.kingyifan.king-mate
productName: King Mate
copyright: Copyright (c) 2026 kingyifan

asar: true

afterPack: scripts/after-pack-rcedit.cjs

asarUnpack:
  - "node_modules/sql.js/**/*"
  - "node_modules/chinese-days/**/*"

directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "resources/**/*"
  - "node_modules/sql.js/**/*"
  - "node_modules/chinese-days/**/*"
  - "package.json"

extraResources:
  - from: "resources/"
    to: "resources/"
    filter:
      - "**/*"

win:
  icon: resources/favicon.ico
  executableName: king-mate
  signAndEditExecutable: false
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64

portable:
  artifactName: "king-mate-${version}-portable.exe"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: King Mate
  artifactName: "king-mate-${version}-setup.exe"

mac:
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity

