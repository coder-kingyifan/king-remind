appId: com.kingyifan.king-remind
productName: king提醒助手
copyright: Copyright (c) 2026 kingyifan

asar: true

asarUnpack:
  - "node_modules/sql.js/**/*"
  - "node_modules/chinese-days/**/*"

directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "resources/**/*"
  - "node_modules/sql.js/**/*"
  - "node_modules/chinese-days/**/*"
  - "package.json"

extraResources:
  - from: "resources/"
    to: "resources/"
    filter:
      - "**/*"

win:
  icon: resources/favicon.ico
  executableName: king-remind
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64

portable:
  artifactName: "king-remind-${version}-portable.exe"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: King提醒助手
  artifactName: "king-remind-${version}-setup.exe"

mac:
  icon: resources/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
