services:
  king-remind:
    build:
      context: .
    image: king-remind:latest
    container_name: king-remind
    restart: unless-stopped
    # 开启伪终端和标准输入，支持交互式 REPL
    stdin_open: true
    tty: true
    # 核心调优：防止 Electron 渲染进程因共享内存不足而崩溃
    shm_size: '2gb'
    ports:
      - "${API_PORT:-33333}:33333"
    volumes:
      - remind-data:/app/data
    environment:
      - API_HOST=0.0.0.0
      - NODE_ENV=production

volumes:
  remind-data: